<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="فەرهەنگی کوردی">
  <title>فەرهەنگی کوردی</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: #f5f0e8;
      background-image:
        radial-gradient(ellipse at 10% 0%, #e8d5b0 0%, transparent 60%),
        radial-gradient(ellipse at 90% 100%, #d4c4a0 0%, transparent 60%);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100%;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      min-height: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-ornament {
      font-size: 28px;
      color: #8b6914;
      letter-spacing: 8px;
      margin-bottom: 8px;
    }

    .header-title {
      font-family: 'Amiri', serif;
      font-size: 48px;
      color: #2c1a00;
      line-height: 1;
      margin-bottom: 4px;
      direction: rtl;
    }

    .header-sub {
      font-size: 15px;
      color: #8b6914;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .search-area {
      width: 100%;
      max-width: 600px;
      margin-bottom: 32px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      background: #fffdf7;
      border: 2px solid #c8a96e;
      border-radius: 4px;
      padding: 14px 20px;
      font-size: 20px;
      font-family: 'Amiri', serif;
      color: #2c1a00;
      outline: none;
      direction: rtl;
      box-shadow: inset 0 2px 6px #c8a96e20, 0 2px 0 #8b691420;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .search-input::placeholder { color: #c8a96e99; font-style: italic; }
    .search-input:focus { border-color: #8b6914; box-shadow: inset 0 2px 6px #c8a96e30, 0 0 0 3px #8b691415; }

    .search-btn {
      background: #2c1a00;
      color: #f5e6c4;
      border: none;
      border-radius: 4px;
      padding: 14px 24px;
      font-size: 15px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 3px 0 #8b691460;
      -webkit-tap-highlight-color: transparent;
    }

    .search-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #8b691460; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .lang-toggle {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: transparent;
      border: 1px solid #c8a96e;
      border-radius: 3px;
      padding: 6px 14px;
      font-size: 12px;
      color: #8b6914;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      letter-spacing: 1px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .lang-btn.active { background: #8b6914; color: #fff; border-color: #8b6914; }

    .divider {
      width: 100%;
      max-width: 600px;
      text-align: center;
      color: #c8a96e;
      font-size: 18px;
      letter-spacing: 6px;
      margin: 8px 0 24px;
    }

    .result-card {
      width: 100%;
      max-width: 600px;
      background: #fffdf7;
      border: 1px solid #c8a96e60;
      border-radius: 6px;
      padding: 32px;
      box-shadow: 0 4px 24px #2c1a0015, 0 1px 0 #c8a96e40;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }

    .result-card::before {
      content: '❧';
      position: absolute;
      top: 16px; left: 20px;
      font-size: 20px;
      color: #c8a96e40;
    }
    .result-card::after {
      content: '❧';
      position: absolute;
      bottom: 16px; right: 20px;
      font-size: 20px;
      color: #c8a96e40;
      transform: scaleX(-1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-word {
      font-family: 'Amiri', serif;
      font-size: 36px;
      color: #2c1a00;
      direction: rtl;
      text-align: right;
      margin-bottom: 4px;
      border-bottom: 1px solid #c8a96e40;
      padding-bottom: 12px;
    }

    .result-lang-tag {
      font-size: 11px;
      color: #8b6914;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: right;
      margin-bottom: 20px;
      direction: rtl;
    }

    .result-section { margin-bottom: 20px; }

    .section-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8b6914;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #c8a96e40;
    }

    .result-text {
      font-size: 18px;
      color: #3d2500;
      line-height: 1.7;
      direction: rtl;
      text-align: right;
    }

    .result-text-ltr {
      font-size: 17px;
      color: #3d2500;
      line-height: 1.7;
      direction: ltr;
      text-align: left;
    }

    .example-box {
      background: #f5e6c420;
      border-right: 3px solid #c8a96e;
      padding: 10px 14px;
      border-radius: 2px;
      font-style: italic;
      direction: rtl;
      text-align: right;
      color: #5a3a00;
      font-size: 17px;
      line-height: 1.6;
    }

    .example-translation {
      margin-top: 6px;
      font-size: 15px;
      color: #8b6914;
      font-style: normal;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px;
      color: #8b6914;
    }

    .loading-dots { display: flex; gap: 6px; }

    .dot {
      width: 8px; height: 8px;
      background: #8b6914;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .error-msg {
      text-align: center;
      color: #8b2500;
      font-size: 17px;
      padding: 24px;
      background: #fff0e8;
      border: 1px solid #c8694060;
      border-radius: 4px;
      width: 100%;
      max-width: 600px;
      direction: rtl;
    }

    .empty-state {
      text-align: center;
      color: #8b6914;
      opacity: 0.6;
      margin-top: 20px;
      font-size: 32px;
      letter-spacing: 12px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-ornament">✦ ✦ ✦</div>
      <div class="header-title">فەرهەنگی کوردی</div>
      <div class="header-sub">Kurdish Dictionary</div>
    </div>

    <div class="search-area">
      <div class="search-row" id="searchRow">
        <button class="search-btn" id="searchBtn" onclick="doSearch()">گەڕان</button>
        <input class="search-input" id="searchInput" placeholder="وشەیەک بنووسە..." dir="rtl" onkeydown="if(event.key==='Enter') doSearch()">
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-ku-en" onclick="setLang('ku-en')">کوردی → ئینگلیزی</button>
        <button class="lang-btn" id="btn-en-ku" onclick="setLang('en-ku')">English → کوردی</button>
        <button class="lang-btn" id="btn-ku-ar" onclick="setLang('ku-ar')">کوردی → عەرەبی</button>
      </div>
    </div>

    <div class="divider">— ❧ —</div>

    <div class="loading hidden" id="loading">
      <div class="loading-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span>گەڕان دەکرێت...</span>
    </div>

    <div class="error-msg hidden" id="errorMsg"></div>

    <div class="result-card hidden" id="resultCard">
      <div class="result-word" id="resWord"></div>
      <div class="result-lang-tag" id="resType"></div>
      <div class="result-section">
        <div class="section-label">KURDISH</div>
        <div class="result-text" id="resMeaningKu"></div>
      </div>
      <div class="result-section">
        <div class="section-label" id="resTargetLabel">ENGLISH</div>
        <div id="resMeaningTarget"></div>
      </div>
      <div class="result-section" id="resExampleSection">
        <div class="section-label">EXAMPLE · نموونە</div>
        <div class="example-box">
          <div id="resExample"></div>
          <div class="example-translation" id="resExampleTrans"></div>
        </div>
      </div>
    </div>

    <div class="empty-state" id="emptyState">✦ ✦ ✦</div>
  </div>

  <script>
    let currentLang = 'ku-en';

    const langs = {
      'ku-en': { dir: 'rtl', placeholder: 'وشەیەک بنووسە...', btnText: 'گەڕان', targetLabel: 'ENGLISH' },
      'en-ku': { dir: 'ltr', placeholder: 'Type a word...', btnText: 'Search', targetLabel: 'کوردی' },
      'ku-ar': { dir: 'rtl', placeholder: 'وشەیەک بنووسە...', btnText: 'گەڕان', targetLabel: 'عەرەبی' },
    };

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + lang).classList.add('active');

      const cfg = langs[lang];
      const input = document.getElementById('searchInput');
      input.dir = cfg.dir;
      input.style.textAlign = cfg.dir === 'ltr' ? 'left' : 'right';
      input.placeholder = cfg.placeholder;
      input.value = '';

      const row = document.getElementById('searchRow');
      const btn = document.getElementById('searchBtn');
      btn.textContent = cfg.btnText;

      // Reorder button for RTL/LTR
      if (cfg.dir === 'rtl') {
        row.insertBefore(btn, input);
      } else {
        row.appendChild(btn);
      }

      hideAll();
      document.getElementById('emptyState').classList.remove('hidden');
    }

    function hideAll() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('resultCard').classList.add('hidden');
      document.getElementById('emptyState').classList.add('hidden');
    }

    function buildPrompt(word, langId) {
      const map = {
        'ku-en': `You are a Kurdish (Sorani) to English dictionary. The user searched for: "${word}". Respond ONLY in this JSON format (no markdown, no extra text): {"word":"${word}","type":"ناوی/کردار/هاوەڵناو etc in Kurdish","meaning_ku":"short Kurdish definition in Sorani Kurdish","meaning_target":"English meaning/translation","example":"a short example sentence in Kurdish Sorani using the word","example_translation":"English translation of the example"}`,
        'en-ku': `You are an English to Kurdish (Sorani) dictionary. The user searched for: "${word}". Respond ONLY in this JSON format (no markdown, no extra text): {"word":"${word}","type":"noun/verb/adjective etc","meaning_ku":"Kurdish Sorani translation and definition","meaning_target":"English definition","example":"short example sentence in English","example_translation":"Kurdish Sorani translation of the example"}`,
        'ku-ar': `You are a Kurdish (Sorani) to Arabic dictionary. The user searched for: "${word}". Respond ONLY in this JSON format (no markdown, no extra text): {"word":"${word}","type":"ناوی/کردار/هاوەڵناو etc in Kurdish","meaning_ku":"short Kurdish definition in Sorani","meaning_target":"Arabic translation and meaning","example":"short example sentence in Kurdish Sorani","example_translation":"Arabic translation of the example"}`,
      };
      return map[langId];
    }

    async function doSearch() {
      const word = document.getElementById('searchInput').value.trim();
      if (!word) return;

      hideAll();
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('searchBtn').disabled = true;

      try {
        const GEMINI_KEY = 'AIzaSyB2iB27ZoZzTdIUuKreoM9xtW3Ct97ao_U';
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: buildPrompt(word, currentLang) }] }],
            generationConfig: { temperature: 0.2 }
          }),
        });
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        const cfg = langs[currentLang];
        document.getElementById('resWord').textContent = parsed.word;
        document.getElementById('resType').textContent = parsed.type;
        document.getElementById('resMeaningKu').textContent = parsed.meaning_ku;

        const targetEl = document.getElementById('resMeaningTarget');
        targetEl.textContent = parsed.meaning_target;
        if (currentLang === 'ku-en') {
          targetEl.className = 'result-text-ltr';
          targetEl.dir = 'ltr';
        } else {
          targetEl.className = 'result-text';
          targetEl.dir = 'rtl';
        }

        document.getElementById('resTargetLabel').textContent = cfg.targetLabel;
        document.getElementById('resExample').textContent = parsed.example || '';

        const transEl = document.getElementById('resExampleTrans');
        transEl.textContent = parsed.example_translation || '';
        if (currentLang === 'en-ku') {
          transEl.dir = 'rtl';
          transEl.style.textAlign = 'right';
        } else {
          transEl.dir = 'ltr';
          transEl.style.textAlign = 'left';
        }

        if (!parsed.example) document.getElementById('resExampleSection').classList.add('hidden');
        else document.getElementById('resExampleSection').classList.remove('hidden');

        hideAll();
        document.getElementById('resultCard').classList.remove('hidden');
      } catch (e) {
        hideAll();
        const err = document.getElementById('errorMsg');
        err.textContent = 'ببورە، هەڵەیەک ڕوویدا. تکایە دووبارە هەوڵبدە.';
        err.classList.remove('hidden');
      }

      document.getElementById('searchBtn').disabled = false;
    }
  </script>
</body>
</html>
